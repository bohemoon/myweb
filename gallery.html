<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>画廊 - HanLi</title>
	<meta name="description" content="我的摄影作品展示。">
	<style>
		:root{--bg:#0b1220;--accent:#4dd0e1;--text:#eef6fb;--muted:#9aa4b2;--glass-opacity:0.4;--glass-blur:10px}
		*{box-sizing:border-box}
		html,body{height:100%;margin:0}
		body{min-height:100vh;display:flex;flex-direction:column;font-family:Inter,Segoe UI,Helvetica,Arial,sans-serif;color:var(--text);background-color:var(--bg);
			background-image: url('background1.jpg');
			background-size: cover;
			background-position: center center;
			background-repeat: no-repeat;
			background-attachment: fixed;
		}
		/* 导航栏 */
		.navbar{padding:20px;display:flex;justify-content:space-between;align-items:center}
		.navbar a{color:var(--accent);text-decoration:none;font-weight:600;transition:opacity 0.3s}
		.navbar a:hover{opacity:0.8}
		/* 主容器 */
		.container{max-width:1100px;margin:0 auto;padding:40px 20px;flex:1}
		/* 标题卡片 */
		.header-card{background:rgba(255,255,255,0.78);
			backdrop-filter: blur(12px);
			-webkit-backdrop-filter: blur(12px);
			padding:40px;border-radius:20px;text-align:center;margin-bottom:32px}
		.header-card h1{margin:0 0 8px;font-size:2rem;color:var(--accent)}
		.header-card p{margin:0;color:var(--muted);font-size:1.05rem}
		/* 标签栏 */
		.tag-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;justify-content:center}
		.tag-btn{padding:8px 18px;border-radius:20px;border:none;background:rgba(255,255,255,0.55);color:#1a3a4a;font-weight:600;font-size:0.9rem;cursor:pointer;transition:all 0.25s;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
		.tag-btn:hover{background:rgba(77,208,225,0.4);transform:translateY(-2px)}
		.tag-btn.active{background:var(--accent);color:#042;box-shadow:0 2px 12px rgba(77,208,225,0.4)}
		.tag-btn .count{display:inline-block;background:rgba(0,0,0,0.1);border-radius:10px;padding:0 8px;margin-left:4px;font-size:0.8rem}
		.tag-btn.active .count{background:rgba(0,0,0,0.15)}
		/* 画廊网格 */
		.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
		/* 作品卡片 */
		.photo-card{background:rgba(255,255,255,0.78);
			backdrop-filter: blur(12px);
			-webkit-backdrop-filter: blur(12px);
			border-radius:20px;overflow:hidden;transition:transform 0.3s,box-shadow 0.3s;cursor:pointer}
		.photo-card:hover{transform:translateY(-6px);box-shadow:0 12px 32px rgba(0,0,0,0.3)}
		.photo-card .img-wrap{width:100%;aspect-ratio:4/3;overflow:hidden;background:rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:center;font-size:1rem;color:#999;position:relative}
		.photo-card .img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s}
		.photo-card:hover .img-wrap img{transform:scale(1.08)}
		.photo-card .img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;background:linear-gradient(135deg,rgba(77,208,225,0.08),rgba(255,255,255,0.05))}
		.photo-card .info{padding:16px 20px 20px}
		.photo-card .info h3{margin:0 0 4px;font-size:1.15rem;color:#042}
		.photo-card .info p{margin:0;color:#1a3a4a;font-size:0.9rem;line-height:1.5}
		.photo-card .info .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
		.photo-card .info .tags span{background:rgba(77,208,225,0.15);color:var(--accent);padding:2px 10px;border-radius:12px;font-size:0.75rem;font-weight:600}
		/* 灯箱 */
		.lightbox{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);justify-content:center;align-items:center;padding:40px}
		.lightbox.open{display:flex}
		.lightbox img{max-width:90vw;max-height:80vh;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.5);object-fit:contain}
		.lightbox .lb-close{position:absolute;top:20px;right:28px;font-size:2rem;color:#fff;cursor:pointer;opacity:0.7;transition:opacity 0.2s;background:none;border:none}
		.lightbox .lb-close:hover{opacity:1}
		.lightbox .lb-nav{position:absolute;top:50%;transform:translateY(-50%);font-size:2.5rem;color:#fff;cursor:pointer;opacity:0.5;transition:opacity 0.2s;background:none;border:none;padding:20px}
		.lightbox .lb-nav:hover{opacity:1}
		.lightbox .lb-prev{left:10px}
		.lightbox .lb-next{right:10px}
		.lightbox .lb-info{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);padding:12px 24px;border-radius:12px;text-align:center;color:#fff;max-width:80%}
		.lightbox .lb-info h3{margin:0 0 4px;font-size:1.1rem}
		.lightbox .lb-info p{margin:0;font-size:0.9rem;opacity:0.8}
		/* 空状态 */
		.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
		.empty-state .icon{font-size:3rem;margin-bottom:16px}
		/* 信息条 */
		.info-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
		.info-bar .count-label{color:var(--muted);font-size:0.9rem}
		.info-bar .view-mode{display:flex;gap:8px}
		.info-bar .view-btn{background:rgba(255,255,255,0.3);border:none;border-radius:8px;padding:6px 12px;cursor:pointer;color:var(--muted);font-size:0.85rem;transition:all 0.2s}
		.info-bar .view-btn.active{background:rgba(255,255,255,0.55);color:#042;font-weight:600}
		/* 按钮 */
		.btn{display:inline-block;padding:12px 24px;border-radius:8px;background:var(--accent);color:#042;font-weight:700;text-decoration:none;transition:background 0.3s;margin-right:12px;margin-top:12px}
		.btn:hover{background:#2db8cc}
		.btn-secondary{background:rgba(77,208,225,0.2);color:var(--accent);border:1px solid var(--accent)}
		.btn-secondary:hover{background:rgba(77,208,225,0.3)}
		/* 页脚 */
		footer{text-align:center;color:var(--muted);padding:24px 20px;font-size:1rem;letter-spacing:0.8px;opacity:0.75;border-top:1px solid rgba(255,255,255,0.1)}
		/* 响应式 */
		@media(max-width:640px){
			.container{padding:20px}
			.header-card{padding:24px}
			.header-card h1{font-size:1.5rem}
			.gallery-grid{grid-template-columns:1fr}
			.lightbox{padding:20px}
			.lightbox img{max-width:100vw;max-height:60vh}
			.lightbox .lb-prev{left:4px}
			.lightbox .lb-next{right:4px}
		}
	</style>
</head>
<body>
	<nav class="navbar">
		<a href="index.html">← 返回首页</a>
		<a href="about.html">关于我</a>
	</nav>

	<div class="container">
		<div class="header-card">
			<h1>📷 我的摄影作品</h1>
			<p>研究生 · 目标检测 / 知识蒸馏 / 对抗学习 · 用镜头记录生活的美好瞬间</p>
		</div>

		<!-- 标签筛选栏 -->
		<div class="tag-bar" id="tagBar"></div>

		<!-- 信息条 -->
		<div class="info-bar">
			<span class="count-label" id="countLabel">共 0 张照片</span>
		</div>

		<!-- 画廊网格 -->
		<div class="gallery-grid" id="galleryGrid"></div>

		<!-- 空状态 -->
		<div class="empty-state" id="emptyState" style="display:none">
			<div class="icon">🔍</div>
			<p>没有匹配的照片，试试其他标签吧</p>
		</div>
	</div>

	<!-- 灯箱 -->
	<div class="lightbox" id="lightbox">
		<button class="lb-close" id="lbClose">✕</button>
		<button class="lb-nav lb-prev" id="lbPrev">‹</button>
		<button class="lb-nav lb-next" id="lbNext">›</button>
		<img id="lbImage" src="" alt="">
		<div class="lb-info">
			<h3 id="lbTitle"></h3>
			<p id="lbDesc"></p>
		</div>
	</div>

	<footer>
		<div>© 2025 HanLi • 个人简介 — 由 DeepSeek V4 驱动</div>
	</footer>

	<script>
	// 图片数据
	let photos = [];
	let filteredPhotos = [];
	let currentIndex = 0;
	let activeTag = 'all';

	// 加载元数据
	fetch('images/gallery/metadata.json')
		.then(r => r.json())
		.then(data => {
			photos = data.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
			filteredPhotos = [...photos];
			renderTagBar();
			renderGallery();
		})
		.catch(() => {
			document.getElementById('galleryGrid').innerHTML =
				'<div class="empty-state"><div class="icon">📂</div><p>暂未找到照片数据</p></div>';
		});

	// 渲染标签栏
	function renderTagBar() {
		const tagMap = {};
		photos.forEach(p => (p.tags || []).forEach(t => { tagMap[t] = (tagMap[t] || 0) + 1; }));
		const sortedTags = Object.entries(tagMap).sort((a, b) => b[1] - a[1]);

		const bar = document.getElementById('tagBar');
		bar.innerHTML = `<button class="tag-btn active" data-tag="all">全部 <span class="count">${photos.length}</span></button>` +
			sortedTags.map(([tag, count]) =>
				`<button class="tag-btn" data-tag="${tag}">${tag} <span class="count">${count}</span></button>`
			).join('');

		bar.addEventListener('click', e => {
			const btn = e.target.closest('.tag-btn');
			if (!btn) return;
			bar.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
			btn.classList.add('active');
			activeTag = btn.dataset.tag;
			filterAndRender();
		});
	}

	// 筛选并渲染
	function filterAndRender() {
		filteredPhotos = activeTag === 'all'
			? [...photos]
			: photos.filter(p => (p.tags || []).includes(activeTag));
		renderGallery();
	}

	// 渲染画廊
	function renderGallery() {
		const grid = document.getElementById('galleryGrid');
		const empty = document.getElementById('emptyState');
		const label = document.getElementById('countLabel');

		label.textContent = `共 ${filteredPhotos.length} 张照片`;

		if (filteredPhotos.length === 0) {
			grid.innerHTML = '';
			empty.style.display = 'block';
			return;
		}
		empty.style.display = 'none';

		// 备用 emoji 映射
		const emojiMap = {
			'日落': '🌅','山': '🏔️','城市': '🌃','花卉': '🌸','海浪': '🌊','秋天': '🍂',
			'日出': '🌄','夜景': '🌙','风景': '🏞️','自然': '🌿','金色': '✨','蓝色': '💙',
			'海边': '🏖️','建筑': '🏛️','微距': '🔍','春天': '🌷'
		};
		function pickEmoji(tags) {
			for (const t of tags || []) {
				if (emojiMap[t]) return emojiMap[t];
			}
			return '📸';
		}

		grid.innerHTML = filteredPhotos.map((p, i) => {
			const imgSrc = p.thumbnail || p.file;
			const emoji = pickEmoji(p.tags);
			return `
				<div class="photo-card" data-index="${i}">
					<div class="img-wrap">
						<img src="${imgSrc}" alt="${p.title}" loading="lazy"
							onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
						<div class="img-placeholder" style="display:none">${emoji}</div>
					</div>
					<div class="info">
						<h3>${p.title}</h3>
						<p>${p.description || ''}</p>
						<div class="tags">${(p.tags || []).map(t => `<span>${t}</span>`).join('')}</div>
					</div>
				</div>
			`;
		}).join('');

		// 点击卡片打开灯箱
		grid.querySelectorAll('.photo-card').forEach(el => {
			el.addEventListener('click', () => {
				currentIndex = parseInt(el.dataset.index);
				openLightbox(currentIndex);
			});
		});
	}

	// 灯箱
	function openLightbox(index) {
		const p = filteredPhotos[index];
		if (!p) return;
		document.getElementById('lbImage').src = p.file;
		document.getElementById('lbTitle').textContent = p.title;
		document.getElementById('lbDesc').textContent = p.description || '';
		document.getElementById('lightbox').classList.add('open');
		document.body.style.overflow = 'hidden';
	}

	function closeLightbox() {
		document.getElementById('lightbox').classList.remove('open');
		document.body.style.overflow = '';
	}

	function navigateLightbox(delta) {
		const newIdx = currentIndex + delta;
		if (newIdx >= 0 && newIdx < filteredPhotos.length) {
			currentIndex = newIdx;
			openLightbox(currentIndex);
		}
	}

	// 灯箱事件
	document.getElementById('lbClose').addEventListener('click', closeLightbox);
	document.getElementById('lbPrev').addEventListener('click', () => navigateLightbox(-1));
	document.getElementById('lbNext').addEventListener('click', () => navigateLightbox(1));
	document.addEventListener('keydown', e => {
		if (!document.getElementById('lightbox').classList.contains('open')) return;
		if (e.key === 'Escape') closeLightbox();
		if (e.key === 'ArrowLeft') navigateLightbox(-1);
		if (e.key === 'ArrowRight') navigateLightbox(1);
	});
	document.getElementById('lightbox').addEventListener('click', e => {
		if (e.target === e.currentTarget) closeLightbox();
	});

	// 毛玻璃自适应
	(function adjustGlass(){
		const src = 'background1.jpg';
		const img = new Image();
		img.crossOrigin = 'Anonymous';
		img.src = src + '?_=' + Date.now();
		img.onload = function(){
			try{
				const w = 100;
				const h = Math.max(1, Math.round(img.height * (w / img.width)));
				const c = document.createElement('canvas');
				c.width = w; c.height = h;
				const ctx = c.getContext('2d');
				ctx.drawImage(img, 0, 0, w, h);
				const data = ctx.getImageData(0, 0, w, h).data;
				let total = 0, count = 0;
				for(let i = 0; i < data.length; i += 4){
					const r = data[i], g = data[i+1], b = data[i+2];
					const l = 0.2126*r + 0.7152*g + 0.0722*b;
					total += l; count++;
				}
				const avg = total / count;
				let opacity = 0.28 + (avg / 255) * 0.32;
				opacity = Math.max(0.20, Math.min(0.65, opacity));
				document.documentElement.style.setProperty('--glass-opacity', opacity.toFixed(3));
			}catch(err){}
		};
	})();
	</script>
</body></html>
