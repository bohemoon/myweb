<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>画廊 - HanLi</title>
	<meta name="description" content="我的摄影作品展示。">
	<style>
		:root{--bg:#0b1220;--accent:#4dd0e1;--text:#eef6fb;--muted:#9aa4b2;--glass-opacity:0.4;--glass-blur:10px}
		*{box-sizing:border-box}
		html,body{height:100%;margin:0}
		body{min-height:100vh;font-family:Inter,Segoe UI,Helvetica,Arial,sans-serif;color:var(--text);background-color:var(--bg);
			background-image: url('background1.jpg');
			background-size: cover;
			background-position: center center;
			background-repeat: no-repeat;
			background-attachment: fixed;
		}
		/* 导航栏 */
		.navbar{padding:20px;display:flex;justify-content:space-between;align-items:center}
		.navbar a{color:var(--accent);text-decoration:none;font-weight:600;transition:opacity 0.3s}
		.navbar a:hover{opacity:0.8}
		/* 主容器 */
		.container{max-width:1100px;margin:0 auto;padding:40px 20px}
		/* 标题卡片 */
		.header-card{background:rgba(255,255,255,0.55);
			backdrop-filter: blur(var(--glass-blur));
			-webkit-backdrop-filter: blur(var(--glass-blur));
			padding:40px;border-radius:20px;text-align:center;margin-bottom:32px}
		.header-card h1{margin:0 0 8px;font-size:2rem;color:var(--accent)}
		.header-card p{margin:0;color:var(--muted);font-size:1.05rem}
		/* 画廊网格 */
		.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
		/* 作品卡片 */
		.photo-card{background:rgba(255,255,255,0.55);
			backdrop-filter: blur(var(--glass-blur));
			-webkit-backdrop-filter: blur(var(--glass-blur));
			border-radius:20px;overflow:hidden;transition:transform 0.3s,box-shadow 0.3s;cursor:pointer}
		.photo-card:hover{transform:translateY(-6px);box-shadow:0 12px 32px rgba(0,0,0,0.3)}
		.photo-card .img-wrap{width:100%;aspect-ratio:4/3;overflow:hidden;background:rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center;font-size:3rem}
		.photo-card .img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
		.photo-card .info{padding:16px 20px 20px}
		.photo-card .info h3{margin:0 0 4px;font-size:1.15rem;color:var(--text)}
		.photo-card .info p{margin:0;color:var(--muted);font-size:0.9rem;line-height:1.5}
		/* 按钮 */
		.btn{display:inline-block;padding:12px 24px;border-radius:8px;background:var(--accent);color:#042;font-weight:700;text-decoration:none;transition:background 0.3s;margin-right:12px;margin-top:12px}
		.btn:hover{background:#2db8cc}
		.btn-secondary{background:rgba(77,208,225,0.2);color:var(--accent);border:1px solid var(--accent)}
		.btn-secondary:hover{background:rgba(77,208,225,0.3)}
		/* 页脚 */
		footer{text-align:center;color:var(--muted);padding:70px 20px 36px;font-size:1rem;letter-spacing:0.8px;opacity:0.75;border-top:1px solid rgba(255,255,255,0.1);margin-top:40px}
		/* 响应式 */
		@media(max-width:640px){
			.container{padding:20px}
			.header-card{padding:24px}
			.header-card h1{font-size:1.5rem}
			.gallery-grid{grid-template-columns:1fr}
		}
	</style>
</head>
<body>
	<!-- 导航栏 -->
	<nav class="navbar">
		<a href="index.html">← 返回首页</a>
		<a href="about.html">关于我</a>
	</nav>

	<!-- 主容器 -->
	<div class="container">
		<!-- 标题 -->
		<div class="header-card">
			<h1>📷 我的摄影作品</h1>
			<p>用镜头记录生活的美好瞬间</p>
		</div>

		<!-- 画廊网格 -->
		<div class="gallery-grid">
			<div class="photo-card">
				<div class="img-wrap">🌅</div>
				<div class="info">
					<h3>日落时分</h3>
					<p>拍摄于海边，金色的余晖洒满海面，宁静而温暖。</p>
				</div>
			</div>
			<div class="photo-card">
				<div class="img-wrap">🏔️</div>
				<div class="info">
					<h3>山间晨曦</h3>
					<p>清晨的第一缕阳光穿透云雾，照亮山谷。</p>
				</div>
			</div>
			<div class="photo-card">
				<div class="img-wrap">🌃</div>
				<div class="info">
					<h3>城市夜景</h3>
					<p>华灯初上，城市的脉搏在夜色中跳动。</p>
				</div>
			</div>
			<div class="photo-card">
				<div class="img-wrap">🌸</div>
				<div class="info">
					<h3>花间细语</h3>
					<p>春日花园里，花瓣在微风中轻轻摇曳。</p>
				</div>
			</div>
			<div class="photo-card">
				<div class="img-wrap">🌊</div>
				<div class="info">
					<h3>浪花轻舞</h3>
					<p>潮起潮落，每一朵浪花都是自然的诗篇。</p>
				</div>
			</div>
			<div class="photo-card">
				<div class="img-wrap">🍂</div>
				<div class="info">
					<h3>秋日私语</h3>
					<p>林间小径上铺满金黄的落叶，秋意正浓。</p>
				</div>
			</div>
		</div>
	</div>

	<!-- 页脚 -->
	<footer>
		<div>© 2025 HanLi • 个人简介 — 由 DeepSeek V4 驱动</div>
	</footer>

	<script>
	(function adjustGlass(){
		const src = 'background1.jpg';
		const img = new Image();
		img.crossOrigin = 'Anonymous';
		img.src = src + '?_=' + Date.now();
		img.onload = function(){
			try{
				const w = 100;
				const h = Math.max(1, Math.round(img.height * (w / img.width)));
				const c = document.createElement('canvas');
				c.width = w; c.height = h;
				const ctx = c.getContext('2d');
				ctx.drawImage(img, 0, 0, w, h);
				const data = ctx.getImageData(0, 0, w, h).data;
				let total = 0, count = 0;
				for(let i = 0; i < data.length; i += 4){
					const r = data[i], g = data[i+1], b = data[i+2];
					const l = 0.2126*r + 0.7152*g + 0.0722*b;
					total += l; count++;
				}
				const avg = total / count;
				let opacity = 0.28 + (avg / 255) * 0.32;
				opacity = Math.max(0.20, Math.min(0.65, opacity));
				document.documentElement.style.setProperty('--glass-opacity', opacity.toFixed(3));
			}catch(err){
				document.documentElement.style.setProperty('--glass-opacity', '0.12');
			}
		};
		img.onerror = function(){
			document.documentElement.style.setProperty('--glass-opacity', '0.28');
		};
	})();
	</script>
</body></html>
